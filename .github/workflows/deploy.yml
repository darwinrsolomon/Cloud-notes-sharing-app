name: Cloud Notes Sharing CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate PHP Version
        run: php -v

      - name: Check Project Files
        run: ls -la

      - name: Start Local PHP Server
        run: |
          php -S localhost:8000 > server.log 2>&1 &
          sleep 5

      - name: Test Homepage
        run: curl http://localhost:8000

      - name: Upload Logs if Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: server.log

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cloud-notes-app .

      - name: Verify Docker Image
        run: docker images

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Notification
        run: echo "Ready for deployment to AWS EC2 / Firebase Hosting"

